model_name: "unsloth/llama-3-8b-bnb-4bit"
max_seq_length: 128

training_arguments:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  optim: "adamw_8bit"
  num_train_epochs: 20
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  warmup_steps: 10
  seed: 3407
  output_dir: "outputs"

lora_arguments:
  r: 16
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  use_gradient_checkpointing: "unsloth"

save_model_path: "saved_model"
